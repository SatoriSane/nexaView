<?xml version="1.0" encoding="UTF-8"?>
<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4f46e5;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Fondo con gradiente -->
  <rect width="512" height="512" fill="url(#grad)"/>
  
  <!-- Símbolo de blockchain (capas) -->
  <g stroke="rgba(255,255,255,0.9)" stroke-width="20.48" fill="rgba(255,255,255,0.9)" stroke-linecap="round">
    <!-- Capa superior -->
    <ellipse cx="256" cy="179.2" rx="153.6" ry="38.4" />
    <line x1="102.4" y1="179.2" x2="102.4" y2="256" />
    <line x1="409.6" y1="179.2" x2="409.6" y2="256" />
    
    <!-- Capa media -->
    <ellipse cx="256" cy="256" rx="153.6" ry="38.4" />
    <line x1="102.4" y1="256" x2="102.4" y2="332.8" />
    <line x1="409.6" y1="256" x2="409.6" y2="332.8" />
    
    <!-- Capa inferior -->
    <ellipse cx="256" cy="332.8" rx="153.6" ry="38.4" />
    <path d="M 102.4 332.8 A 153.6 38.4 0 0 0 409.6 332.8" fill="none"/>
  </g>
  
  <!-- Texto "NB" -->
  <text x="256" y="281.6" 
        font-family="Arial, sans-serif" 
        font-size="128" 
        font-weight="bold" 
        fill="rgba(255,255,255,0.95)" 
        text-anchor="middle" 
        dominant-baseline="middle">NB</text>
</svg>