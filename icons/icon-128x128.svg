<?xml version="1.0" encoding="UTF-8"?>
<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4f46e5;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Fondo con gradiente -->
  <rect width="128" height="128" fill="url(#grad)"/>
  
  <!-- Símbolo de blockchain (capas) -->
  <g stroke="rgba(255,255,255,0.9)" stroke-width="5.12" fill="rgba(255,255,255,0.9)" stroke-linecap="round">
    <!-- Capa superior -->
    <ellipse cx="64" cy="44.8" rx="38.4" ry="9.6" />
    <line x1="25.6" y1="44.8" x2="25.6" y2="64" />
    <line x1="102.4" y1="44.8" x2="102.4" y2="64" />
    
    <!-- Capa media -->
    <ellipse cx="64" cy="64" rx="38.4" ry="9.6" />
    <line x1="25.6" y1="64" x2="25.6" y2="83.2" />
    <line x1="102.4" y1="64" x2="102.4" y2="83.2" />
    
    <!-- Capa inferior -->
    <ellipse cx="64" cy="83.2" rx="38.4" ry="9.6" />
    <path d="M 25.6 83.2 A 38.4 9.6 0 0 0 102.4 83.2" fill="none"/>
  </g>
  
  <!-- Texto "NB" -->
  <text x="64" y="70.4" 
        font-family="Arial, sans-serif" 
        font-size="32" 
        font-weight="bold" 
        fill="rgba(255,255,255,0.95)" 
        text-anchor="middle" 
        dominant-baseline="middle">NB</text>
</svg>