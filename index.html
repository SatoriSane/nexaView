<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Check Nexa address balance in real-time">
    <meta name="theme-color" content="transparent">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <!-- PWA Meta Tags -->
    <link rel="manifest" href="/manifest.json">
    <link rel="icon" type="image/png" sizes="128x128" href="/icons/icon-128x128.png">
    <link rel="icon" type="image/png" sizes="512x512" href="/icons/icon-512x512.png">
    <link rel="apple-touch-icon" href="/icons/icon-512x512.png">

    <title>nexaView - Nexa Balance Checker</title>
    <link rel="stylesheet" href="/css/base.css">
    <link rel="stylesheet" href="/css/header.css">
    <link rel="stylesheet" href="/css/input.css">
    <link rel="stylesheet" href="/css/wallet.css">
    <link rel="stylesheet" href="/css/footer.css">
    <link rel="stylesheet" href="/css/notifications.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="logo">
                <img src="./full-nexa-logo.svg" alt="Nexa Logo" class="logo-icon">
                <h1>View</h1>
            </div>
            <p class="subtitle">View Nexa Wallet Balances (Read-Only)</p>
        </header>

        <!-- Main -->
        <main>
            <!-- Input Section -->
            <div id="inputSection" class="input-section hidden">
                <label for="addressInput" class="label">Enter Nexa Address</label>
                <div class="input-group">
                    <input 
                        type="text" 
                        id="addressInput" 
                        class="input" 
                        placeholder="nexa:..."
                        autocomplete="off"
                        spellcheck="false"
                    >
                    <button id="clearBtn" class="clear-btn" title="Clear">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="18" y1="6" x2="6" y2="18"></line>
                            <line x1="6" y1="6" x2="18" y2="18"></line>
                        </svg>
                    </button>
                </div>

                <div id="errorMessage" class="error-message hidden"></div>

                <div class="action-buttons">
                    <button id="cancelBtn" class="btn btn-secondary">Cancel</button>
                    <button id="checkBalanceBtn" class="btn btn-primary">
                        <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M5 13l4 4L19 7"/>
                        </svg>
                        Track
                    </button>
                </div>
            </div>

            <!-- Tracked Wallets -->
             
            <div id="trackedWalletsSection" class="tracked-wallets-section hidden">
                <div class="section-header">
                    <h3 class="section-title">Tracked Wallets</h3>
                    <button id="refreshAllBtn" class="text-btn" title="Refresh all balances">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M23 4v6h-6M1 20v-6h6M3.51 9a9 9 0 0 1 14.13-3.36L23 10M1 14l5.37 4.36A9 9 0 0 0 20.49 15"/>
                        </svg>
                        Refresh All
                    </button>
                </div>
                <div id="trackedWalletsList" class="tracked-wallets-list"></div>
            </div>
        </main>

        <!-- Footer -->
        <footer class="footer">
            <button id="installAppBtn" class="install-app-btn hidden" title="Install App">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"/>
                </svg>
                Install NEXAView
            </button>
            <p>
                <span class="status-indicator" id="statusIndicator"></span>
                <span id="statusText">Ready</span>
            </p>
            <p class="footer-note">Public query only • No private information required</p>

            <div id="updateNotification" class="update-notification hidden">
                <span>New version available!</span>
                <button id="updateBtn" class="update-btn">Update Now</button>
            </div>
        </footer>
    </div>


    <!-- JavaScript Modules -->
    <script type="module">
        import './js/config.js';
        import './js/pwa.js';
        import './js/ui.js';
        import './js/wallets.js';
        import './js/balanceClient.js';
        import './js/app.js';
    </script>
    <button id="addWalletBtn" class="fab" title="Add wallet">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
            <path d="M12 5v14M5 12h14"/>
        </svg>
    </button>
</body>
</html>
